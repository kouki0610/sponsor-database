<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報（安定版）</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;margin:40px;}

button{
 padding:10px;
 margin:5px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
 cursor:pointer;
}
button:hover{background:#1a5dc9;}
.delete-btn{background:red;}

table{
 border-collapse:collapse;
 width:100%;
 margin-top:20px;
}

th,td{
 border:1px solid #333;
 padding:10px;
 text-align:center;
}

input{
 width:100%;
 padding:6px;
 box-sizing:border-box;
}

/* 編集中ハイライト */
.editing{
 background:#fff6d6;
}

/* 横スクロール備考 */
.note-scroll{
 max-width:300px;
 overflow-x:auto;
 white-space:nowrap;
 border:1px solid #ddd;
 padding:5px;
 background:#fff;
}

.small-btn{
 background:#e74c3c;
 color:white;
 border:none;
 padding:5px 8px;
 border-radius:4px;
 cursor:pointer;
}
</style>

</head>

<body>

<button onclick="location.href='index.html'">←戻る</button>
<button onclick="editCompany()">企業編集</button>
<button onclick="deleteCompany()">削除</button>
<button onclick="addYear()">年度追加</button>

<h1 id="name"></h1>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<p><b>地図：</b><a id="maplink" target="_blank">開く</a></p>

<h2>協賛履歴</h2>

<table>
<thead>
<tr>
<th>年度</th>
<th>状況</th>
<th>金額</th>
<th>備考</th>
<th>削除</th>
</tr>
</thead>
<tbody id="yearTable"></tbody>
</table>

<h2>備考（企業全体）</h2>
<p id="notes"></p>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const id = new URLSearchParams(location.search).get("id");

// =========================
// メインロード
// =========================
function load(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();
  if(!c) return;

  document.getElementById("name").textContent = c.name || "";
  document.getElementById("address").textContent = c.address || "";
  document.getElementById("email").textContent = c.email || "";
  document.getElementById("phone").textContent = c.phone || "";
  document.getElementById("notes").textContent = c.notes || "";

  const map = c.map || "";
  document.getElementById("maplink").href =
   map.startsWith("http") ? map : "#";

  const years = c.years || {};

  const table = document.getElementById("yearTable");
  table.innerHTML = "";

  Object.keys(years).sort().forEach(y=>{

   const d = years[y] || {status:"",amount:0,notes:""};

   const tr = document.createElement("tr");

   // 年度
   const tdYear = document.createElement("td");
   tdYear.textContent = y;

   // 状態
   const tdStatus = document.createElement("td");
   tdStatus.textContent = d.status || "";
   tdStatus.onclick = ()=>cycleStatus(y);

   if(d.status==="○") tdStatus.style.color="green";
   if(d.status==="△") tdStatus.style.color="orange";
   if(d.status==="×") tdStatus.style.color="red";

   // 金額（安定編集）
   const tdAmount = createEditableCell(
    d.amount || 0,
    value=>{
     db.ref(`companies/${id}/years/${y}/amount`)
     .set(Number(value));
    }
   );

   // 備考（安定編集＋横スクロール）
   const tdNotes = document.createElement("td");

   const wrap = document.createElement("div");
   wrap.className="note-scroll";

   const inputNotes = createEditableInput(
    d.notes || "",
    value=>{
     db.ref(`companies/${id}/years/${y}/notes`)
     .set(value);
    }
   );

   inputNotes.style.minWidth="400px";

   wrap.appendChild(inputNotes);
   tdNotes.appendChild(wrap);

   // 削除
   const tdDelete = document.createElement("td");
   const btn = document.createElement("button");
   btn.textContent="削除";
   btn.className="small-btn";

   btn.onclick = (e)=>{
    e.stopPropagation();
    if(confirm("削除しますか？")){
     db.ref(`companies/${id}/years/${y}`).remove()
     .then(load);
    }
   };

   tdDelete.appendChild(btn);

   tr.appendChild(tdYear);
   tr.appendChild(tdStatus);
   tr.appendChild(tdAmount);
   tr.appendChild(tdNotes);
   tr.appendChild(tdDelete);

   table.appendChild(tr);

  });

 });

}

// =========================
// 安定入力セル（汎用）
// =========================
function createEditableCell(initialValue, onSave){

 const td = document.createElement("td");
 const input = document.createElement("input");

 input.value = initialValue;

 let editing = false;

 input.onclick = ()=>{
  if(editing) return;
  if(confirm("編集しますか？")){
   editing = true;
   input.classList.add("editing");
  }
 };

 input.ondblclick = (e)=>{
  e.stopPropagation();
  editing = true;
  input.classList.add("editing");
 };

 input.onblur = ()=>{
  if(!editing) return;
  editing = false;
  input.classList.remove("editing");
  onSave(input.value);
 };

 td.appendChild(input);
 return td;
}

// =========================
// 安定入力（備考用）
// =========================
function createEditableInput(value, onSave){

 const input = document.createElement("input");
 input.value = value;

 let editing = false;

 input.onclick = ()=>{
  if(editing) return;
  if(confirm("編集しますか？")){
   editing = true;
   input.classList.add("editing");
  }
 };

 input.ondblclick = ()=>{
  editing = true;
  input.classList.add("editing");
 };

 input.onblur = ()=>{
  if(!editing) return;
  editing = false;
  input.classList.remove("editing");
  onSave(input.value);
 };

 return input;
}

// =========================
// ステータス循環
// =========================
function cycleStatus(year){

 db.ref(`companies/${id}/years/${year}`).once("value", snap=>{

  const d = snap.val() || {};
  const now = d.status || "";

  let next="";
  if(now==="") next="○";
  else if(now==="○") next="△";
  else if(now==="△") next="×";
  else next="";

  db.ref(`companies/${id}/years/${year}/status`)
  .set(next);

  load();

 });

}

// =========================
// 年度追加
// =========================
function addYear(){

 const y = prompt("年度");
 if(!y) return;

 db.ref(`companies/${id}/years/${y}`).set({
  status:"",
  amount:0,
  notes:""
 });

 load();
}

// =========================
// 企業編集
// =========================
function editCompany(){

 db.ref("companies/"+id).once("value", snap=>{

  const c = snap.val();

  const name = prompt("企業名", c.name||"");
  const address = prompt("住所", c.address||"");
  const email = prompt("メール", c.email||"");
  const phone = prompt("電話", c.phone||"");
  const map = prompt("地図", c.map||"");
  const notes = prompt("備考", c.notes||"");

  db.ref("companies/"+id).update({
   name,address,email,phone,map,notes
  });

  load();

 });

}

// =========================
// 削除
// =========================
function deleteCompany(){

 if(confirm("本当に削除しますか？")){
  db.ref("companies/"+id).remove()
  .then(()=>location.href="index.html");
 }

}

load();

</script>

</body>
</html>
