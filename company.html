<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
body{font-family:sans-serif;margin:40px;}

button{
 padding:10px;
 margin:5px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
 cursor:pointer;
}

button:hover{background:#1a5dc9;}
.delete-btn{background:red;}

input{
 width:100%;
 padding:5px;
 box-sizing:border-box;
}

.pdf-box{
 margin-top:10px;
 padding:10px;
 border:1px solid #ccc;
 background:#f9f9f9;
}
</style>

</head>

<body>

<button onclick="location.href='index.html'">←戻る</button>
<button onclick="editCompany()">編集</button>
<button onclick="deleteCompany()" class="delete-btn">削除</button>

<h1 id="name"></h1>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<p><b>地図：</b><a id="maplink" target="_blank">開く</a></p>

<h2>備考</h2>
<p id="notes"></p>

<h2>企業PDF</h2>

<div class="pdf-box">
 <a id="pdfLink" target="_blank">未登録</a>
 <br><br>
 <button onclick="uploadPDF()">PDFアップロード / 差し替え</button>
</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app",
 storageBucket: "teienn-kyousan.appspot.com"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const storage = firebase.storage();

const id = new URLSearchParams(location.search).get("id");

// =========================
// 表示
// =========================
function load(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();

  if(!c){
   alert("データなし");
   return;
  }

  document.getElementById("name").textContent = c.name || "";
  document.getElementById("address").textContent = c.address || "";
  document.getElementById("email").textContent = c.email || "";
  document.getElementById("phone").textContent = c.phone || "";
  document.getElementById("notes").textContent = c.notes || "";

  const map = c.map || "";
  document.getElementById("maplink").href =
   map.startsWith("http") ? map : "#";

  // PDF
  const pdf = document.getElementById("pdfLink");
  pdf.href = c.pdfUrl || "#";
  pdf.textContent = c.pdfUrl ? "PDFを見る" : "未登録";

 });

}

// =========================
// PDFアップロード
// =========================
function uploadPDF(){

 const fileInput = document.createElement("input");
 fileInput.type = "file";
 fileInput.accept = "application/pdf";

 fileInput.onchange = async (e)=>{

  const file = e.target.files[0];
  if(!file) return;

  const path = `pdfs/${id}/${file.name}`;
  const ref = storage.ref(path);

  await ref.put(file);

  const url = await ref.getDownloadURL();

  db.ref("companies/"+id)
  .update({pdfUrl:url});

  load();
 };

 fileInput.click();
}

// =========================
// 編集
// =========================
function editCompany(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();

  db.ref("companies/"+id).update({
   name:prompt("企業名",c.name),
   address:prompt("住所",c.address),
   email:prompt("メール",c.email),
   phone:prompt("電話",c.phone),
   map:prompt("GoogleMap",c.map),
   notes:prompt("備考",c.notes)
  });

  load();
 });

}

// =========================
// 削除
// =========================
function deleteCompany(){

 if(!confirm("削除？")) return;

 db.ref("companies/"+id).remove()
 .then(()=>location.href="index.html");

}

load();

</script>

</body>
</html>
