<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>

<body>

<button onclick="location.href='index.html'">←戻る</button>

<h1 id="name"></h1>
<p id="address"></p>
<p id="email"></p>
<p id="phone"></p>

<a id="maplink" target="_blank">地図</a>

<h2>備考</h2>
<p id="notes"></p>

<script>

if(localStorage.getItem("loggedin")!=="true"){
location.href="index.html";
}

const firebaseConfig = {
 apiKey: "AIza...",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const id = new URLSearchParams(location.search).get("id");

db.ref("companies/"+id).once("value", snap=>{

const c=snap.val();

document.getElementById("name").textContent=c.name||"";
document.getElementById("address").textContent=c.address||"";
document.getElementById("email").textContent=c.email||"";
document.getElementById("phone").textContent=c.phone||"";
document.getElementById("notes").textContent=c.notes||"";

document.getElementById("maplink").href=c.map||"#";

});

</script>

</body>
</html>
