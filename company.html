<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
font-family:sans-serif;
margin:40px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid black;
padding:10px;
text-align:center;
}

.status-ok{color:green;font-weight:bold;}
.status-maybe{color:orange;font-weight:bold;}
.status-no{color:red;font-weight:bold;}

</style>

</head>

<body>

<button onclick="location.href='index.html'">←一覧</button>

<h1 id="name"></h1>

<p><b>住所：</b><span id="address"></span></p>
<p><b>メール：</b><span id="email"></span></p>
<p><b>電話：</b><span id="phone"></span></p>

<a id="maplink" target="_blank">
<img id="map" width="300">
</a>

<h2>協賛履歴</h2>

<table>

<tr><th>年度</th><th>状況</th></tr>

<tr><td>2025</td><td id="y2025"></td></tr>
<tr><td>2026</td><td id="y2026"></td></tr>
<tr><td>2027</td><td id="y2027"></td></tr>
<tr><td>2028</td><td id="y2028"></td></tr>
<tr><td>2029</td><td id="y2029"></td></tr>

</table>

<p><b>備考：</b><span id="notes"></span></p>

<script>

if(localStorage.getItem("loggedin")!=="true"){
location.href="index.html";
}

const firebaseConfig = {
apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
authDomain: "teienn-kyousan.firebaseapp.com",
databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "teienn-kyousan",
storageBucket: "teienn-kyousan.firebasestorage.app",
messagingSenderId: "567202456256",
appId: "1:567202456256:web:156b0587040cbbfaa1c325"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const params=new URLSearchParams(location.search);
const id=params.get("id");

db.ref("companies/"+id).once("value",snap=>{

const c=snap.val();

document.getElementById("name").textContent=c.name||"";
document.getElementById("address").textContent=c.address||"";
document.getElementById("email").textContent=c.email||"";
document.getElementById("phone").textContent=c.phone||"";

document.getElementById("map").src=c.map||"";
document.getElementById("maplink").href=c.map||"";

document.getElementById("notes").textContent=c.notes||"";

const years=c.years||{};

for(const y in years){

const s=years[y];
const cell=document.getElementById("y"+y);

if(!cell) continue;

cell.textContent=s;

if(s==="○"||s==="◎") cell.className="status-ok";
if(s==="△") cell.className="status-maybe";
if(s==="×") cell.className="status-no";

}

});

</script>

</body>
</html>
