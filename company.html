<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>企業情報（編集ボタン制）</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;margin:40px;}

button{
 padding:8px 12px;
 margin:3px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
 cursor:pointer;
}
button:hover{background:#1a5dc9;}
.delete-btn{background:red;}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:20px;
}

th,td{
 border:1px solid #333;
 padding:10px;
 text-align:center;
}

input{
 width:100%;
 padding:5px;
 box-sizing:border-box;
}

/* 編集禁止状態 */
input:disabled{
 background:#f5f5f5;
}

/* 行ごと編集状態 */
.editing{
 background:#fffbe6;
}
</style>

</head>

<body>

<button onclick="location.href='index.html'">←戻る</button>
<button onclick="addYear()">年度追加</button>

<h1 id="name"></h1>

<table>
<thead>
<tr>
<th>年度</th>
<th>状態</th>
<th>金額</th>
<th>備考</th>
<th>操作</th>
</tr>
</thead>

<tbody id="yearTable"></tbody>
</table>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if(!firebase.apps.length){
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const id = new URLSearchParams(location.search).get("id");

// =========================
// 読み込み
// =========================
function load(){

 db.ref("companies/"+id).once("value", snap=>{
  const c = snap.val();
  if(!c) return;

  document.getElementById("name").textContent = c.name||"";

  const years = c.years||{};
  const table = document.getElementById("yearTable");
  table.innerHTML="";

  Object.keys(years).sort().forEach(y=>{

   const d = years[y]||{status:"",amount:0,notes:""};

   const tr = document.createElement("tr");

   // 年度
   const tdYear = document.createElement("td");
   tdYear.textContent = y;

   // 状態
   const tdStatus = document.createElement("td");
   const inputStatus = document.createElement("input");
   inputStatus.value = d.status||"";
   inputStatus.disabled = true;

   tdStatus.appendChild(inputStatus);

   // 金額
   const tdAmount = document.createElement("td");
   const inputAmount = document.createElement("input");
   inputAmount.type="number";
   inputAmount.value = d.amount||0;
   inputAmount.disabled = true;

   tdAmount.appendChild(inputAmount);

   // 備考
   const tdNotes = document.createElement("td");
   const inputNotes = document.createElement("input");
   inputNotes.value = d.notes||"";
   inputNotes.disabled = true;

   tdNotes.appendChild(inputNotes);

   // 操作
   const tdAction = document.createElement("td");

   const editBtn = document.createElement("button");
   editBtn.textContent="編集";

   const saveBtn = document.createElement("button");
   saveBtn.textContent="保存";

   const cancelBtn = document.createElement("button");
   cancelBtn.textContent="キャンセル";

   // 編集開始
   editBtn.onclick = ()=>{

    tr.classList.add("editing");

    inputStatus.disabled = false;
    inputAmount.disabled = false;
    inputNotes.disabled = false;

   };

   // キャンセル
   cancelBtn.onclick = ()=>{

    tr.classList.remove("editing");

    inputStatus.value = d.status||"";
    inputAmount.value = d.amount||0;
    inputNotes.value = d.notes||"";

    inputStatus.disabled = true;
    inputAmount.disabled = true;
    inputNotes.disabled = true;

   };

   // 保存
   saveBtn.onclick = ()=>{

    db.ref(`companies/${id}/years/${y}`).set({
     status:inputStatus.value,
     amount:Number(inputAmount.value),
     notes:inputNotes.value
    });

    tr.classList.remove("editing");

    inputStatus.disabled = true;
    inputAmount.disabled = true;
    inputNotes.disabled = true;

    load();
   };

   tdAction.appendChild(editBtn);
   tdAction.appendChild(saveBtn);
   tdAction.appendChild(cancelBtn);

   tr.appendChild(tdYear);
   tr.appendChild(tdStatus);
   tr.appendChild(tdAmount);
   tr.appendChild(tdNotes);
   tr.appendChild(tdAction);

   table.appendChild(tr);

  });

 });

}

// =========================
// 年度追加
// =========================
function addYear(){

 const y = prompt("年度");
 if(!y) return;

 db.ref(`companies/${id}/years/${y}`).set({
  status:"",
  amount:0,
  notes:""
 });

 load();
}

load();

</script>

</body>
</html>
