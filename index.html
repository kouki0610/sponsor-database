<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>協賛企業データベース</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
 font-family:sans-serif;
 margin:40px;
 background:#f5f5f5;
}

h1{
 margin-bottom:20px;
}

button{
 padding:10px;
 margin:5px;
 border:none;
 background:#2c7be5;
 color:white;
 border-radius:5px;
 cursor:pointer;
}
button:hover{background:#1a5dc9;}

input{
 padding:10px;
 width:100%;
 max-width:400px;
 margin-bottom:10px;
 border-radius:5px;
 border:1px solid #ccc;
}

ul{
 list-style:none;
 padding:0;
}

li{
 background:white;
 padding:15px;
 margin-bottom:10px;
 border-radius:8px;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
 display:flex;
 justify-content:space-between;
 align-items:center;
 cursor:pointer;
}

li:hover{
 background:#f0f4ff;
}

.status{
 font-weight:bold;
}

.status-ok{color:green;}
.status-maybe{color:orange;}
.status-no{color:red;}
</style>
</head>

<body>

<div id="login">
<h2>ログイン</h2>
<input type="password" id="password">
<button onclick="login()">ログイン</button>
</div>

<div id="main" style="display:none">

<h1>協賛企業データベース</h1>

<input type="text" id="search" placeholder="検索">

<button onclick="addCompany()">＋追加</button>
<button onclick="exportCSV()">CSV出力</button>
<button onclick="location.href='totals.html'">協賛金額</button>

<ul id="companyList"></ul>

</div>

<script>

let allCompanies = {};

const firebaseConfig = {
 apiKey: "AIzaSyBMTL3U-88HpEXXW2jbW9QzmTk-JO17AcI",
 databaseURL: "https://teienn-kyousan-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if (!firebase.apps.length) {
 firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

// =========================
// ログイン
// =========================
function login(){
 const pass = document.getElementById("password").value;

 if(pass==="joie"){
  localStorage.setItem("loggedin","true");
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
  loadCompanies();
 }else{
  alert("パスワードが違います");
 }
}

// 自動ログイン
if(localStorage.getItem("loggedin")==="true"){
 document.getElementById("login").style.display="none";
 document.getElementById("main").style.display="block";
 loadCompanies();
}

// =========================
// データ読み込み
// =========================
function loadCompanies(){
 db.ref("companies").on("value", snap=>{
  allCompanies = snap.val() || {};
  render();
 });
}

// =========================
// 表示（修正版）
// =========================
function render(filter=""){

const list = document.getElementById("companyList");
list.innerHTML="";

if(!allCompanies) return;

Object.values(allCompanies)
.filter(c=>c && c.name && c.name.includes(filter))
.forEach(c=>{

if(!c.id) return;

const li = document.createElement("li");

let years = c.years || {};
const latestYear = Object.keys(years).sort().slice(-1)[0];

// ★ここが重要修正
const data = latestYear ? years[latestYear] : {};
const status = data.status || "";

// ○ → 〇 に変換
const displayStatus = status === "○" ? "〇" : status;

let cls = "";
if(status==="○") cls="status-ok";
if(status==="△") cls="status-maybe";
if(status==="×") cls="status-no";

li.innerHTML = `
 <span>${c.name}</span>
 <span class="status ${cls}">
  ${latestYear ? latestYear + ":" + (displayStatus || "未") : "未登録"}
 </span>
`;

li.addEventListener("click", ()=>{
 location.href = "company.html?id=" + c.id;
});

list.appendChild(li);

});

}

// =========================
// 検索
// =========================
document.getElementById("search").oninput = e=>{
render(e.target.value);
};

// =========================
// 追加
// =========================
function addCompany(){

const name = prompt("企業名");
if(!name) return;

const id = Date.now();

db.ref("companies/"+id).set({
 id:id,
 name:name,
 address:prompt("住所"),
 email:prompt("メール"),
 phone:prompt("電話"),
 map:prompt("GoogleMap URL"),
 notes:prompt("備考"),
 years:{
  "2025":{
   status:"",
   amount:0,
   notes:""
  }
 }
});

alert("追加完了");
}

// =========================
// CSV
// =========================
function exportCSV(){

let csv="企業名,住所,メール,電話\n";

Object.values(allCompanies).forEach(c=>{
csv += `"${c.name||""}","${c.address||""}","${c.email||""}","${c.phone||""}"\n`;
});

const blob = new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="companies.csv";
a.click();

}

</script>

</body>
</html>
